<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PersonalTrader — Research Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  background:#05080f;
  color:#94a3b8;
  font-family:'Inter','Segoe UI',system-ui,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.container{
  max-width:560px;
  padding:24px;
}
h1{
  color:#e2e8f0;
  font-size:32px;
  font-weight:700;
  margin-bottom:8px;
  letter-spacing:-0.5px;
}
.tag{
  display:inline-block;
  background:rgba(59,130,246,0.12);
  color:#3b82f6;
  font-size:12px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.5px;
  padding:4px 10px;
  border-radius:4px;
  border:1px solid rgba(59,130,246,0.25);
  margin-bottom:20px;
}
p{
  font-size:15px;
  line-height:1.6;
  margin-bottom:24px;
}
.links a{
  color:#3b82f6;
  text-decoration:none;
  font-weight:500;
  font-size:14px;
}
.links a:hover{
  text-decoration:underline;
}
.footer{
  margin-top:40px;
  font-size:12px;
  color:#64748b;
}
</style>
</head>
<body>
<div class="container">
  <div class="tag">Research Project</div>
  <h1>PersonalTrader</h1>
  <p>A personal trading terminal for research and algorithmic strategy development. Not a commercial product.</p>
  <div class="links">
    <a href="https://github.com/hithgub">github.com/hithgub</a>
  </div>
  <div class="footer">
    © 2026 · Built for personal use only
  </div>
</div>
</body>
</html>
